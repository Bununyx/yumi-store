name: Weekly Database Backup

on:
  schedule:
    - cron: "0 3 * * 0" # Каждое воскресенье в 03:00 UTC
  workflow_dispatch: # Возможность запустить вручную из вкладки Actions

permissions:
  contents: write
  actions: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          npm init -y
          npm install @supabase/supabase-js

      - name: Run Backup Script
        run: node js/backup.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit & Push Backup
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add backups/
          git diff --staged --quiet || git commit -m "chore: weekly backup $(date +%Y-%m-%d)"
          git push
